# krai-insights — standalone stack.
# The FleetMgmt MSSQL source lives here (moved out of KRAI-minimal on
# 2026-05-21). Its data is the krai-insights-owned volume `fleetmgmt_data`,
# restored from a .bak (see docs/fleetmgmt_restore_*).
#
# `app` and `fleetmgmt-mssql` also join the KRAI stack's network
# (`krai-minimal_krai-network`, aliased `krai-shared`) so both stacks talk by
# container name: the app reaches krai-postgres-prod (krai_pm) and
# krai-ollama-prod, and KRAI reaches FleetMgmt as `fleetmgmt-mssql` again.
#
#   docker compose up -d insights-postgres app          # core stack
#   docker compose up -d fleetmgmt-mssql                # FleetMgmt source
#   docker compose run --rm app python scripts/migrate.py
#   docker compose --profile agent up -d ollama          # optional local LLM
#
# WARNING: never `docker compose down -v` with fleetmgmt-mssql up — it would
# delete the 62M-row FleetMgmt volume. Use plain `down` to stop.
name: krai-insights

services:
  insights-postgres:
    image: postgres:16
    container_name: krai-insights-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${INSIGHTS_DB_NAME:-krai_insights}
      POSTGRES_USER: ${INSIGHTS_DB_USER:-insights}
      POSTGRES_PASSWORD: ${INSIGHTS_DB_PASSWORD:?set INSIGHTS_DB_PASSWORD in .env}
    ports:
      - "${INSIGHTS_DB_PORT:-5433}:5432"
    volumes:
      - insights_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INSIGHTS_DB_USER:-insights} -d ${INSIGHTS_DB_NAME:-krai_insights}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: krai-insights-app
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the network the DB is reachable as the service name on 5432.
      INSIGHTS_DB_HOST: insights-postgres
      INSIGHTS_DB_PORT: 5432
    ports:
      - "8501:8501"
    depends_on:
      insights-postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach host-based source DBs
    volumes:
      - ./:/app    # live code mount for dev; drop in prod image builds
    networks:
      - default        # krai-insights internal (insights-postgres, fleetmgmt)
      - krai-shared    # reach krai-postgres-prod (krai_pm) + krai-ollama-prod

  # FleetMgmt MSSQL — read-only analysis source (DevFleetMgmt, 62M rows).
  # Moved from KRAI-minimal/docker-compose.fleetmgmt.yml. Data persists in the
  # external volume `krai-minimal_fleetmgmt_data` (declared below).
  fleetmgmt-mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: krai-fleetmgmt-mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}
      MSSQL_AGENT_ENABLED: "false"
      MSSQL_TCP_PORT: "1433"
    ports:
      - "1433:1433"
    volumes:
      - fleetmgmt_data:/var/opt/mssql
      # Restore/import sources (read-only). Defaults are local; point
      # FLEETMGMT_BACKUP_DIR / FLEETMGMT_IMPORT_DIR at the real sources in .env.
      - ${FLEETMGMT_BACKUP_DIR:-./database/fleetmgmt/backups}:/backups:ro
      - ${FLEETMGMT_IMPORT_DIR:-./database/fleetmgmt/import}:/import:ro
      - ./database/fleetmgmt/scripts:/scripts:ro
      - ./database/fleetmgmt/logs:/logs
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -t 5 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: 6g
    cpus: 4.0
    networks:
      - default        # same internal net as the app
      - krai-shared    # let KRAI services reach FleetMgmt by name again

  # Optional — local LLM for the KI-Agent (Phase 5). Enable with:
  #   docker compose --profile agent up -d ollama
  ollama:
    image: ollama/ollama:latest
    container_name: krai-insights-ollama
    restart: unless-stopped
    profiles: ["agent"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

networks:
  # Shared with the KRAI stack so both can talk by container name
  # (krai-postgres-prod / krai-ollama-prod <-> krai-insights app / fleetmgmt-mssql).
  krai-shared:
    external: true
    name: krai-minimal_krai-network

volumes:
  insights_pgdata:
  ollama_models:
  # FleetMgmt data — krai-insights-owned named volume. The old external
  # krai-minimal_fleetmgmt_data was deleted during the transfer; the DB is
  # restored into this fresh volume from the .bak (see docs/fleetmgmt_restore_*).
  # DANGER: `docker compose down -v` would delete this AND insights_pgdata.
  fleetmgmt_data:
