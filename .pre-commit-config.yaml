# Lokale Commit-Hooks: Secrets-Scan + Lint, bevor etwas in die Historie gelangt.
# Einrichten:  pip install pre-commit && pre-commit install
# Einmal über alles:  pre-commit run --all-files
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
